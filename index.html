<nav class="bg-black text-white p-4 flex gap-4 flex-wrap">

<button @click="page='favorites'">Favorites</button>
<button @click="page='compare'">Compare</button>

<section x-show="page==='home'" class="p-6">
<h1 class="text-5xl font-bold mb-4">🔥 Amazon Picks</h1>
<input x-model="search" placeholder="Search products..." class="border p-2 w-full mb-4">

<div class="grid md:grid-cols-4 gap-4">
<template x-for="p in products.filter(x=>x.name.toLowerCase().includes(search.toLowerCase()))">
<div class="bg-white p-4 rounded shadow">
<div class="text-xs text-orange-600" x-text="p.badge"></div>
<h3 class="font-bold" x-text="p.name"></h3>
<p x-text="p.category"></p>

<div class="flex gap-2 mt-2">
<button class="bg-pink-500 text-white px-2 py-1 rounded"
@click="favorites.push(p.id); localStorage.setItem('favorites',JSON.stringify(favorites))">
❤
</button>

<button class="bg-blue-500 text-white px-2 py-1 rounded"
@click="compare.push(p.id); localStorage.setItem('compare',JSON.stringify(compare))">
Compare
</button>
</div>

<a class="block mt-3 bg-orange-500 text-white text-center p-2 rounded"
:href="'https://www.amazon.com/s?k='+encodeURIComponent(p.keyword)+'&tag=stumblely-21'"
target="_blank" rel="nofollow sponsored">
View on Amazon
</a>
</div>
</template>
</div>
</section>

<section x-show="page==='deals'" class="p-6">
<h2 class="text-3xl font-bold">Deals</h2>
<p>⚡ Deal Countdown Active</p>
</section>

<section x-show="page==='favorites'" class="p-6">
<h2 class="text-3xl font-bold">Favorites</h2>
<p x-text="'Saved items: ' + favorites.length"></p>
</section>

<section x-show="page==='compare'" class="p-6">
<h2 class="text-3xl font-bold">Compare</h2>
<p x-text="'Products selected: ' + compare.length"></p>
</section>

<section x-show="page==='faq'" class="p-6">
<h2 class="text-3xl font-bold">FAQ</h2>
<details><summary>Affiliate Disclosure</summary>
<p>As an Amazon Associate I earn from qualifying purchases.</p>
</details>
</section>

<section x-show="page==='blog'" class="p-6">
<h2 class="text-3xl font-bold">Blog</h2>
<p>Buying guides and reviews.</p>
</section>
